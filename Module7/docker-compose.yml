version: "3.8"
services:
  db:
    image: postgres:15
    ports: 
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: productsdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - appnetworks
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d productsdb"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    ports:
      - "8082:8082"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=password
      - DB_NAME=productsdb
      - JWT_SECRET=mysecret
    networks:
      - appnetworks
networks:
  appnetworks:
volumes:
  postgres_data: